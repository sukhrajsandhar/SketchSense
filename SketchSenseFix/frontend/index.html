<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whiteboard Co-Pilot</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

  <link rel="stylesheet" href="styles.css" />

  <!-- Apply saved/default theme before paint — no flash -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
    })();
  </script>
</head>
<body>

<div class="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <div class="wordmark">
      <span class="wordmark-title">Whiteboard Co-Pilot</span>
      <span class="wordmark-sub">/ Vision AI</span>
    </div>

    <div class="header-right">
      <span class="model-tag">gemini-2.5-flash</span>

      <div class="status-row">
        <div class="pip" id="statusPip"></div>
        <span id="statusTxt">Camera offline</span>
      </div>

      <div class="theme-toggle-wrap" data-tooltip="Toggle light / dark">
        <span class="theme-icon sun">☀</span>
        <label class="theme-toggle" aria-label="Toggle dark mode">
          <input type="checkbox" id="themeToggle" />
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
        <span class="theme-icon moon">☽</span>
      </div>
    </div>
  </header>

  <!-- ── Body ───────────────────────────────────────────────── -->
  <div class="body" id="body">

    <!-- Sidebar collapse toggle -->
    <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="Toggle camera panel [" onclick="toggleSidebar()">
      <span class="chevron">‹</span>
    </button>

    <!-- LEFT: Camera sidebar -->
    <aside class="sidebar">

      <div class="sidebar-header">
        <span class="section-label">Camera</span>
        <span class="frame-counter">Frame <em id="frameNum">0</em></span>
      </div>

      <!-- 16:9 locked viewport -->
      <div class="cam-viewport">
        <video id="video" autoplay muted playsinline></video>

        <div class="cam-idle" id="camIdle">
          <div class="cam-idle-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M2 8.5C2 7.4 2.9 6.5 4 6.5h1.5L7 4.5h10l1.5 2H20c1.1 0 2 .9 2 2v11c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V8.5z"/>
            </svg>
          </div>
          <p>Camera inactive</p>
        </div>

        <div class="cam-scan" id="camScan"></div>

        <div class="cam-brackets" id="camBrackets">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <!-- Last captured frame thumbnail -->
      <div class="cam-thumb-wrap" id="camThumbWrap">
        <img class="cam-thumb" id="camThumb" src="" alt="Last frame" />
        <div class="cam-thumb-meta">
          <span class="cam-thumb-label">Last frame</span>
          <span class="cam-thumb-time" id="camThumbTime">—</span>
        </div>
      </div>

      <!-- Nudge shown when live but not yet analyzed -->
      <div class="cam-nudge" id="camNudge">
        <div class="nudge-dot"></div>
        <p>Camera live — hit <strong>Analyze</strong><span class="space-hint"> or press <strong>Space</strong></span></p>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="controls-row">
          <button class="btn" id="btnStart" onclick="startCamera()">Start</button>
          <button class="btn" id="btnStop"  onclick="stopCamera()" disabled>Stop</button>
        </div>
        <button class="btn btn-primary" id="btnAnalyze" onclick="analyzeFrame()" disabled>Analyze</button>
      </div>

    </aside>

    <!-- RIGHT: Chat panel -->
    <main class="chat-panel">

      <div class="chat-header">
        <div class="chat-header-left">
          <span class="section-label">AI Tutor</span>
        </div>
        <button class="clear-btn" onclick="clearAll()">Clear</button>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <p class="empty-title">Ready when you are.</p>
          <p class="empty-hint">Start the camera, point it at your work,<br/>and hit <strong>Analyze</strong> — or ask anything below.</p>
        </div>
      </div>

      <div class="chat-input-wrap">

        <!-- Live video PiP — shown during voice+video session -->
        <div class="pip-wrap" id="pipWrap">
          <video id="pipVideo" autoplay muted playsinline></video>
          <div class="pip-label">Live</div>
        </div>

        <div class="chat-input-inner">
          <button id="btnMic" data-state="idle" title="Start live voice" onclick="toggleVoice()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="11" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="8"  y1="22" x2="16" y2="22"/>
            </svg>
          </button>
          <button id="btnCam" title="Share camera with AI" onclick="toggleLiveCamera()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 7l-7 5 7 5V7z"/>
              <rect x="1" y="5" width="15" height="14" rx="2"/>
            </svg>
          </button>
          <textarea id="chatInput" placeholder="Ask a follow-up question…" rows="1"></textarea>
          <div class="volume-wrap" title="AI voice volume">
            <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" title="Volume"/>
          </div>
          <button id="btnTTS" class="tts-on" title="Mute AI voice" onclick="toggleTTS()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <button id="btnSend" onclick="sendChat()">Send</button>
        </div>
      </div>

    </main>
  </div>

  <!-- Mobile tab bar (hidden on desktop via CSS) -->
  <nav class="mobile-tabs">
    <button class="mobile-tab active" id="tabCamera" onclick="mobileTab('camera')">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M2 8.5C2 7.4 2.9 6.5 4 6.5h1.5L7 4.5h10l1.5 2H20c1.1 0 2 .9 2 2v11c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V8.5z"/>
      </svg>
      Camera
      <span class="tab-pip" id="tabPip"></span>
    </button>
    <button class="mobile-tab" id="tabChat" onclick="mobileTab('chat')">
      <svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      AI Tutor
    </button>
  </nav>

</div>

<canvas id="canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- ES module entry point -->
<script type="module" src="app.js"></script>
</body>
</html>
